<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="referrer"
    content="strict-origin-when-cross-origin"
  >

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>YouTube Live Signage</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <iframe
    src="https://www.youtube.com/embed/EA9rDs3Fx2Q?autoplay=1&mute=1&controls=0&playsinline=1"
    title="YouTube Live Stream"
    allow="autoplay; encrypted-media; picture-in-picture"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
  </iframe>
</body>
</html>
